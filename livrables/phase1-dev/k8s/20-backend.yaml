# APP2 — Backend API
# PHASE 1 : ServiceAccount par défaut, secret en clair, aucune restriction.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: todo-app
  labels: { app: todo-backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: todo-backend }
  template:
    metadata:
      labels: { app: todo-backend }
    spec:
      containers:
        - name: backend
          # Phase 2 : on ne tire plus l'image locale importée dans containerd,
          # mais l'image publiée par la CI dans le registry GHCR (industrialisation).
          # NB : tag `latest` = simple pour la démo ; en prod on épingle par SHA
          #      (image immuable) — cf. réponse A.5 du README Phase 2.
          image: ghcr.io/dami-lowdev/todo-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - { name: DB_HOST,     value: "todo-db" }
            - { name: DB_PORT,     value: "5432" }
            - { name: DB_NAME,     value: "todos" }
            - { name: DB_USER,     value: "todo" }
            - { name: DB_PASSWORD, value: "todo" }   # [VULN] secret en clair
            - { name: LOG_LEVEL,   value: "DEBUG" }  # [VULN] logs verbeux
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend
  namespace: todo-app
spec:
  type: ClusterIP            # interne uniquement (non exposé à l'utilisateur)
  selector: { app: todo-backend }
  ports:
    - port: 5000
      targetPort: 5000
