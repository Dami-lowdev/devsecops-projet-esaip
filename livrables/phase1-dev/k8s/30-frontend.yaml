# APP1 — Frontend
# Seul service exposé à l'utilisateur final (NodePort).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  namespace: todo-app
  labels: { app: todo-frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: todo-frontend }
  template:
    metadata:
      labels: { app: todo-frontend }
    spec:
      containers:
        - name: frontend
          image: todo-frontend:1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: BACKEND_URL, value: "http://todo-backend:5000" }
            - { name: LOG_LEVEL,   value: "INFO" }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
  namespace: todo-app
spec:
  type: NodePort            # exposé à l'utilisateur (point d'entrée)
  selector: { app: todo-frontend }
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080       # accessible sur http://<IP-node>:30080
