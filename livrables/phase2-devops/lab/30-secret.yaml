# Phase 2 - Etape 0 : secret "sensible" à exfiltrer.
# Un Secret Kubernetes n'est PAS chiffré : il est seulement encodé en base64
# (stocké en clair dans etcd par défaut). N'importe qui pouvant "get secrets"
# via l'API peut donc le décoder trivialement -> démontré dans le scénario.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: lab
type: Opaque
stringData:                 # stringData = saisie en clair, encodé en base64 à l'apply
  username: admin
  password: SuperPassword123   # [VULN] secret accessible via l'API par le SA permissif
